name: Publish

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  publish:
    name: Publish to npm
    # Only run when a release PR (title = vX.X.X) is merged
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.title, 'v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # push tags & create GitHub releases
      id-token: write # npm provenance attestation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --provenance --access public

      # Only tag and create the GitHub release after a successful publish
      - name: Create git tag and GitHub release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git tag "v$VERSION"
          git push origin "v$VERSION"
          gh release create "v$VERSION" --generate-notes --title "v$VERSION"
        env:
          GH_TOKEN: ${{ github.token }}
