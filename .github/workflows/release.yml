name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type (auto-detected from conventional commits if not set)
        required: false
        default: ''
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

# Prevent concurrent releases
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Create Release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required by changelogen to read all commits

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint || true

      - name: Test
        run: bun test || true

      # Create a release branch before changelogen, run changelogen and commit on the branch, push, then open PR
      - name: Create release branch
        run: |
          VERSION_BEFORE=$(node -p "require('./package.json').version")
          BRANCH="release/v$VERSION_BEFORE"
          git checkout -b "$BRANCH"

      # Run changelogen and only commit if there are changes
      - name: Bump version and generate changelog (on release branch)
        id: changelogen
        run: |
          BUMP="${{ inputs.bump }}"
          if [ -n "$BUMP" ]; then
            npx changelogen@latest --$BUMP
          else
            npx changelogen@latest --bump
          fi
          git add package.json CHANGELOG.md || true
          VERSION=$(node -p "require('./package.json').version")
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): v$VERSION"
            echo "has_changes=true" >> $GITHUB_ENV
          else
            echo "No changes to commit. Skipping PR creation."
            echo "has_changes=false" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Push release branch
        if: env.has_changes == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v$VERSION"
          git push origin "$BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create release PR
        if: env.has_changes == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BRANCH="release/v$VERSION"
          gh pr create \
            --title "v$VERSION" \
            --body "Release v$VERSION" \
            --base main \
            --head "$BRANCH"
        env:
          GH_TOKEN: ${{ github.token }}
